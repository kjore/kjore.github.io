<svg xmlns="http://www.w3.org/2000/svg" width="940" height="320" viewBox="0 0 940 320">
  <rect width="940" height="320" fill="#f7fafc"/>
  <style>
    .title{font:700 25px Arial,"Microsoft YaHei",sans-serif;fill:#111827}
    .cell{fill:#ffffff;stroke:#2f6f8f;stroke-width:2;rx:12}
    .gate{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:8}
    .state{stroke:#16a34a;stroke-width:4;marker-end:url(#arrow)}
    .arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
    .text{font:18px Arial,"Microsoft YaHei",sans-serif;fill:#111827}
    .small{font:15px Arial,"Microsoft YaHei",sans-serif;fill:#475569}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="40" y="45" class="title">LSTM：用门控保护长期记忆</text>
  <rect x="210" y="90" width="520" height="170" class="cell"/>
  <line x1="125" y1="120" x2="805" y2="120" class="state"/>
  <text x="70" y="126" class="small">c<tspan baseline-shift="sub">t-1</tspan></text>
  <text x="820" y="126" class="small">c<tspan baseline-shift="sub">t</tspan></text>
  <rect x="260" y="165" width="105" height="50" class="gate"/>
  <text x="285" y="196" class="text">遗忘门</text>
  <rect x="420" y="165" width="105" height="50" class="gate"/>
  <text x="445" y="196" class="text">输入门</text>
  <rect x="580" y="165" width="105" height="50" class="gate"/>
  <text x="605" y="196" class="text">输出门</text>
  <line x1="315" y1="255" x2="315" y2="220" class="arrow"/>
  <line x1="475" y1="255" x2="475" y2="220" class="arrow"/>
  <line x1="635" y1="255" x2="635" y2="220" class="arrow"/>
  <text x="450" y="292" class="text">x<tspan baseline-shift="sub">t</tspan>, h<tspan baseline-shift="sub">t-1</tspan></text>
  <line x1="705" y1="190" x2="790" y2="190" class="arrow"/>
  <text x="805" y="196" class="small">h<tspan baseline-shift="sub">t</tspan></text>
  <text x="260" y="78" class="small">cell state 是一条更稳定的记忆通道</text>
</svg>
