<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#f7fafc"/>
  <style>
    .title{font:700 25px Arial,"Microsoft YaHei",sans-serif;fill:#111827}
    .label{font:18px Arial,"Microsoft YaHei",sans-serif;fill:#334155}
    .point{stroke:#ffffff;stroke-width:3}
    .axis{stroke:#94a3b8;stroke-width:2;marker-end:url(#arrow)}
    .box{fill:#ffffff;stroke:#2f6f8f;stroke-width:2;rx:10}
    .arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="40" y="45" class="title">词嵌入：从离散编号到连续语义空间</text>
  <rect x="55" y="105" width="135" height="60" class="box"/>
  <text x="82" y="142" class="label">token id</text>
  <line x1="205" y1="135" x2="290" y2="135" class="arrow"/>
  <rect x="305" y="105" width="155" height="60" class="box"/>
  <text x="333" y="142" class="label">embedding</text>
  <line x1="475" y1="135" x2="555" y2="135" class="arrow"/>
  <line x1="610" y1="245" x2="835" y2="245" class="axis"/>
  <line x1="610" y1="245" x2="610" y2="75" class="axis"/>
  <circle cx="665" cy="145" r="12" fill="#2563eb" class="point"/>
  <text x="682" y="151" class="label">猫</text>
  <circle cx="705" cy="132" r="12" fill="#2563eb" class="point"/>
  <text x="722" y="138" class="label">狗</text>
  <circle cx="760" cy="208" r="12" fill="#16a34a" class="point"/>
  <text x="778" y="214" class="label">汽车</text>
  <circle cx="792" cy="190" r="12" fill="#16a34a" class="point"/>
  <text x="810" y="196" class="label">轿车</text>
  <text x="618" y="270" class="label">语义维度 1</text>
  <text x="528" y="82" class="label">语义维度 2</text>
</svg>
